# 1. General
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:Tc"

set -g history-limit 1000000

# Faster escape sequences
set -sg escape-time 10

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows after closing
set -g renumber-windows on

# Automatically rename windows
set -g automatic-rename on

# Enable standard clipboard integration (allows OSC 52 pass-through)
set -g set-clipboard on

# Reload config
bind r source-file "$HOME/.tmux.conf" \; display-message "tmux config reloaded"

# 2. Prefix
# Prefer C-a for local tmux sessions, and C-b for remote.
# Saves the dance of doing C-b C-b for each command too.
if-shell 'test -n "$SSH_TTY"' {
    set -g prefix C-b
    bind C-b send-prefix
} {
    set -g prefix C-a
    unbind C-b
    bind C-a send-prefix
}

# 3. Mouse
setw -g mouse on

# 4. Splits
# Easier split keys, open panes in current directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# 5. Vim mode
set-window-option -g mode-keys vi

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# 'v' to begin selection
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 'y' to copy selection to system clipboard via small scriptlet
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "yank"

unbind -T copy-mode-vi MouseDragEnd1Pane

# 6. Appearance
# ====================================================================
# Dracula Color Palette Variables
# ====================================================================
white='#f8f8f2'
gray='#44475a'
dark_gray='#282a36'
light_purple='#bd93f9'
dark_purple='#6272a4'
cyan='#8be9fd'
green='#50fa7b'
orange='#ffb86c'
red='#ff5555'
pink='#ff79c6'

# ====================================================================
# Shared Global Settings
# ====================================================================
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 100
set -g status-style "bg=${dark_gray},fg=${white}"

# ====================================================================
# Conditional Layout: LOCAL vs REMOTE (Nested)
# ====================================================================

set -g status-position bottom

# 1. IF REMOTE: Put status at the TOP, use Cyan/Orange theme
if-shell '[ -n "$SSH_CLIENT" ]' {
    # Left Side: Session Name (Cyan block)
    set -g status-left "#[bg=${cyan},fg=${dark_gray},bold] #S #[bg=${dark_gray},fg=${cyan}] "
    
    # Window List: Active window is Orange
    setw -g window-status-style "bg=${gray},fg=${white}"
    setw -g window-status-current-style "bg=${orange},fg=${dark_gray},bold"
    setw -g window-status-current-format " #I:#W "
    
    # Right Side: Big Red REMOTE warning
    set -g status-right "#[bg=${red},fg=${white},bold] REMOTE #[bg=${gray},fg=${white}] %Y-%m-%d #[bg=${dark_purple},fg=${white}] %H:%M "
}

# 2. IF LOCAL: Put status at the BOTTOM, use standard Purple/Pink theme
if-shell '[ -z "$SSH_CLIENT" ]' {
    # Left Side: Session Name (Purple block)
    set -g status-left "#[bg=${light_purple},fg=${dark_gray},bold] #S #[bg=${dark_gray},fg=${light_purple}] "
    
    # Window List: Active window is Pink
    setw -g window-status-style "bg=${gray},fg=${white}"
    setw -g window-status-current-style "bg=${pink},fg=${dark_gray},bold"
    setw -g window-status-current-format " #I:#W "
    
    # Right Side: Green LOCAL badge
    set -g status-right "#[bg=${green},fg=${dark_gray},bold] LOCAL #[bg=${gray},fg=${white}] %Y-%m-%d #[bg=${dark_purple},fg=${white}] %H:%M "
}

# 7. Misc Keybindings
# Smart pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


if-shell "test -e ~/.tmux.conf.work" {
    source-file "~/.tmux.conf.work"
}
if-shell "test -e ~/.tmux.conf.personal" {
    source-file "~/.tmux.conf.personal"
}
